<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sequence Diagram — Squashy</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --surface2: #ebebeb;
      --border: #d0d0d0;
      --border2: #b0b0b0;
      --text: #111111;
      --muted: #666666;
      --dim: #aaaaaa;
      --ink: #111111;
      --accent: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      min-height: 100vh;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 28px 60px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 36px;
      border-bottom: 2px solid #000;
      padding-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      color: #000;
    }

    .brand-name {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .brand-name span {
      color: var(--muted);
      font-weight: 400;
    }

    h1 {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    h1 em {
      font-style: normal;
      color: var(--muted);
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    /* ── Tabs ── */
    .tab-switcher {
      display: inline-flex;
      border: 2px solid #000;
      margin-bottom: 28px;
    }

    .tab-btn {
      padding: 9px 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.15s;
      border-right: 2px solid #000;
    }

    .tab-btn:last-child {
      border-right: none;
    }

    .tab-btn.active {
      background: #000;
      color: #fff;
    }

    .tab-btn:not(.active):hover {
      background: var(--surface);
      color: #000;
    }

    /* ── Panel ── */
    .diagram-panel {
      display: none;
    }

    .diagram-panel.active {
      display: block;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      margin: 8px 0 0;
      border-left: 3px solid #000;
      background: var(--surface);
    }

    .sec-num {
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      background: #000;
      padding: 1px 6px;
      letter-spacing: 0.5px;
    }

    .sec-title {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: #000;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Actor bar ── */
    .actor-bar {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-top: 2px solid #000;
      border-bottom: 2px solid #000;
      padding: 10px 0 0;
    }

    .actor-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .actor-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 10px;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1.5px solid #000;
      white-space: nowrap;
      background: #fff;
      color: #000;
    }

    .actor-chip.filled {
      background: #000;
      color: #fff;
    }

    .actor-lifeline-top {
      width: 1px;
      height: 10px;
      background: #000;
    }

    /* ── Messages ── */
    .messages {
      position: relative;
    }

    .msg-row {
      display: flex;
      align-items: center;
      min-height: 42px;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: background 0.1s;
    }

    .msg-row:hover {
      background: var(--surface);
    }

    .lifeline-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
      pointer-events: none;
    }

    .arrow-area {
      position: relative;
      flex: 1;
      height: 42px;
    }

    .arrow-area svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .msg-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .msg-label .lbl {
      background: #fff;
      border: 1px solid var(--border2);
      padding: 2px 7px;
      font-size: 10px;
      color: #111;
      max-width: 100%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-label .note {
      font-size: 9px;
      color: var(--muted);
      margin-top: 1px;
      font-style: italic;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 24px;
      padding: 12px 16px;
      border: 1.5px solid #000;
    }

    .legend-title {
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .legend-line {
      width: 32px;
      height: 2px;
    }

    .legend-line.solid {
      background: #000;
    }

    .legend-line.dashed {
      background: repeating-linear-gradient(to right,
          #888 0,
          #888 4px,
          transparent 4px,
          transparent 8px);
    }

    .leg-chip {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid #000;
    }

    .leg-chip.filled {
      background: #000;
    }

    @media (max-width: 600px) {
      .actor-chip {
        font-size: 8px;
        padding: 3px 5px;
      }

      .msg-label .lbl {
        font-size: 9px;
      }
    }
  </style>
</head>

    // ── RENDER ───────────────────────────────────────────────────────
    function buildMessages(containerId, actors, sections, msgs) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      const n = actors.length;
      const pct = actors.map((_, i) => (i / (n - 1)) * 100);

      const secMap = {};
      sections.forEach((s) => {
        secMap[s.start] = s;
      });

      msgs.forEach((m, idx) => {
        const [from, to, label, style, note] = m;

        if (secMap[idx]) {
          const s = secMap[idx];
          const div = document.createElement("div");
          div.className = "section-header";
          div.innerHTML = `<span class="sec-num">${s.label.split(".")[0].trim()}</span><span class="sec-title">${s.label.replace(/^\d+\.\s*/, "")}</span>`;
          container.appendChild(div);
        }

        const row = document.createElement("div");
        row.className = "msg-row";

        // Lifelines
        actors.forEach((_, i) => {
          const ll = document.createElement("div");
          ll.className = "lifeline-bg";
          ll.style.left = pct[i] + "%";
          row.appendChild(ll);
        });

        // Arrow
        const aa = document.createElement("div");
        aa.className = "arrow-area";

        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        svg.setAttribute("viewBox", "0 0 1000 42");
        svg.setAttribute("preserveAspectRatio", "none");
        svg.style.cssText =
          "position:absolute;inset:0;width:100%;height:100%;overflow:visible";

        const markId = `m${idx}`;
        const defs = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "defs",
        );
        defs.innerHTML = `<marker id="${markId}" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#000" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </marker>`;
        svg.appendChild(defs);

        const fromX = pct[from] * 10;
        const toX = pct[to] * 10;
        const cy = 21;
        const dashed = style === "dashed";
        const isSelf = from === to;

        if (isSelf) {
          const path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          path.setAttribute(
            "d",
            `M${fromX} ${cy - 7} Q${fromX + 70} ${cy - 7} ${fromX + 70} ${cy} Q${fromX + 70} ${cy + 7} ${fromX} ${cy + 7}`,
          );
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "#000");
          path.setAttribute("stroke-width", dashed ? "1.2" : "1.8");
          path.setAttribute("marker-end", `url(#${markId})`);
          if (dashed) path.setAttribute("stroke-dasharray", "8 5");
          svg.appendChild(path);
        } else {
          const dir = toX > fromX ? 1 : -1;
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );
          line.setAttribute("x1", fromX);
          line.setAttribute("y1", cy);
          line.setAttribute("x2", toX - dir * 4);
          line.setAttribute("y2", cy);
          line.setAttribute("stroke", "#000");
          line.setAttribute("stroke-width", dashed ? "1.2" : "1.8");
          line.setAttribute("marker-end", `url(#${markId})`);
          if (dashed) line.setAttribute("stroke-dasharray", "8 5");
          svg.appendChild(line);
        }

        // Activation box
        const ab = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "rect",
        );
        ab.setAttribute("x", pct[to] * 10 - 4);
        ab.setAttribute("y", cy - 6);
        ab.setAttribute("width", "8");
        ab.setAttribute("height", "12");
        ab.setAttribute("rx", "1");
        ab.setAttribute(
          "fill",
          dashed ? "rgba(0,0,0,0.08)" : "rgba(0,0,0,0.15)",
        );
        ab.setAttribute("stroke", "#000");
        ab.setAttribute("stroke-width", "0.5");
        svg.appendChild(ab);

        aa.appendChild(svg);

        // Label
        const lblDiv = document.createElement("div");
        lblDiv.className = "msg-label";
        const mx = isSelf ? pct[from] + 8 : (pct[from] + pct[to]) / 2;
        lblDiv.style.left = Math.max(2, Math.min(85, mx - 14)) + "%";
        lblDiv.style.right = "auto";
        lblDiv.style.width = "28%";
        lblDiv.innerHTML =
          `<span class="lbl">${label}</span>` +
          (note ? `<span class="note">${note}</span>` : "");
        aa.appendChild(lblDiv);

        row.appendChild(aa);
        container.appendChild(row);
      });
    }

    // ── TABS ─────────────────────────────────────────────────────────
    function switchTab(tab, btn) {
      document
        .querySelectorAll(".diagram-panel")
        .forEach((p) => p.classList.remove("active"));
      document
        .querySelectorAll(".tab-btn")
        .forEach((b) => b.classList.remove("active"));
      document.getElementById("panel-" + tab).classList.add("active");
      btn.classList.add("active");
    }

    // ── INIT ─────────────────────────────────────────────────────────
    buildMessages("msgs-buyer", BUYER_ACTORS, BUYER_SECTIONS, BUYER_MSGS);
    buildMessages("msgs-seller", SELLER_ACTORS, SELLER_SECTIONS, SELLER_MSGS);
  </script>
